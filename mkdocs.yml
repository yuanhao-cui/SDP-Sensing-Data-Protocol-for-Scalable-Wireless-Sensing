site_name: WSDP Documentation
site_description: Wi-Fi Sensing Data Processing Library
site_author: WSDP Team
site_url: https://sdp-team.github.io/wsdp

repo_name: sdp-team/wsdp
repo_url: https://github.com/sdp-team/wsdp

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - CLI Usage: user-guide/cli.md
    - Python API: user-guide/python-api.md
    - Configuration: user-guide/configuration.md
  - API Reference:
    - Core: api/core.md
    - Readers: api/readers.md
    - Algorithms: api/algorithms.md
    - Models: api/models.md
  - Datasets:
    - Overview: datasets/overview.md
    - Widar: datasets/widar.md
    - Gait: datasets/gait.md
    - XRF55: datasets/xrf55.md
    - ElderAL: datasets/elderal.md
    - ZTE: datasets/zte.md
  - Development:
    - Contributing: development/contributing.md
    - Changelog: development/changelog.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sdp-team/wsdp

copyright: Copyright &copy; 2026 WSDP Team
